<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple-Sense Live | Tank & Transactions Monitoring</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
            --input-bg: #334155;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 24px;
            margin: 5px 0;
            color: var(--primary);
        }

        header p {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
        }

        .control-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: var(--input-bg);
            border: 1px solid #475569;
            border-radius: 10px;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: var(--primary);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-login { background-color: #2563eb; color: white; }
        .btn-scan { background-color: #16a34a; color: white; }
        .btn-back { background-color: #475569; color: white; margin-bottom: 20px; }
        .btn:disabled { background-color: #475569; color: var(--text-muted); cursor: not-allowed; }

        .status {
            font-size: 14px;
            margin-top: 15px;
            font-weight: 500;
            color: var(--warning);
            text-align: center;
        }

        /* Station Cards */
        .station-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid var(--primary);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .station-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .station-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
        }

        .station-title {
            font-size: 18px;
            font-weight: bold;
        }

        .station-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Tables */
        .tank-table, .tx-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 13px;
        }

        .tank-table th, .tx-table th {
            text-align: left;
            color: var(--text-muted);
            padding-bottom: 6px;
            font-weight: 500;
        }

        .tank-table td, .tx-table td {
            padding: 8px 0;
            border-bottom: 1px solid #334155;
        }

        .progress-bar-container {
            width: 100%;
            background-color: #334155;
            border-radius: 6px;
            height: 12px;
            overflow: hidden;
            margin-top: 4px;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--success);
            width: 0%;
            transition: width 0.3s ease;
        }

        .badge {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            background-color: #334155;
        }
        .badge-pms { color: #f43f5e; background: #881337; }
        .badge-diesel { color: #34d399; background: #064e3b; }

        /* Pump Filter Tabs */
        .pump-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .pump-tab {
            background-color: #334155;
            color: var(--text-muted);
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .pump-tab.active {
            background-color: var(--primary);
            color: #0f172a;
        }

        /* GPS Link Styling */
        .gps-link {
            display: inline-flex;
            align-items: center;
            color: var(--primary);
            text-decoration: none;
            font-size: 11px;
            margin-top: 4px;
            font-weight: 500;
        }
        .gps-link:hover {
            text-decoration: underline;
        }

        /* Screens management */
        .screen {
            display: none;
            width: 100%;
        }
        .screen.active {
            display: block;
        }

        /* Tx Specific Styles */
        .tx-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
        }
        #results {
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Triple-Sense Live</h1>
        <p>Smart Fuel Inventory Monitoring System</p>
    </header>

    <div id="mainScreen" class="screen active">
        <div class="control-card">
            <div class="input-group">
                <label for="usernameInput">Username</label>
                <input type="text" id="usernameInput" class="input-field" placeholder="Enter username" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label for="passwordInput">Password</label>
                <input type="password" id="passwordInput" class="input-field" placeholder="Enter password" autocomplete="off">
            </div>

            <button onclick="loginAndGetToken()" id="loginBtn" class="btn btn-login">1. Login to System</button>
            <button onclick="scanLastHalfHour()" id="scanBtn" class="btn btn-scan" disabled>2. Fetch Tank Data</button>
            
            <div id="status" class="status">Please enter credentials and login...</div>
        </div>

        <div id="results"></div>
    </div>

    <div id="detailsScreen" class="screen">
        <button onclick="showMainScreen()" class="btn btn-back">← Back to Stations</button>
        
        <div class="tx-card">
            <h2 id="detailsStationName" style="margin-top:0; color: var(--primary);">Station Name</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 15px;">Today's Transactions Log (With Tracking)</p>
            
            <div id="pumpTabsContainer" class="pump-tabs"></div>

            <div id="txStatus" class="status" style="text-align: left; margin: 10px 0;">Loading transactions...</div>
            
            <table class="tx-table" id="txTable" style="display: none;">
                <thead>
                    <tr>
                        <th style="text-align: left;">Time / Vehicle</th>
                        <th style="text-align: left;">Product / Pump</th>
                        <th style="text-align: right;">Volume (L)</th>
                    </tr>
                </thead>
                <tbody id="txRows">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
const BASE_URL = "https://services.triple-sense.com:7455/tsense-rest";

let currentToken = "";
let currentCompanyId = "";
let rawStationsData = []; 
let currentLoadedTransactions = []; 

function getLastHalfHourPeriods() {
    const periods = [];
    const now = new Date();
    for (let i = 0; i < 6; i++) {
        const checkTime = new Date(now.getTime() - (i * 5 * 60 * 1000));
        const year = checkTime.getFullYear();
        const month = String(checkTime.getMonth() + 1).padStart(2, '0');
        const day = String(checkTime.getDate()).padStart(2, '0');
        const hours = String(checkTime.getHours()).padStart(2, '0');
        const minutes = String(checkTime.getMinutes()).padStart(2, '0');
        periods.push(`${year}${month}${day}${hours}${minutes}00`);
    }
    return periods;
}

async function loginAndGetToken() {
    const statusDiv = document.getElementById('status');
    const loginBtn = document.getElementById('loginBtn');
    const scanBtn = document.getElementById('scanBtn');
    
    const username = document.getElementById("usernameInput").value.trim();
    const password = document.getElementById("passwordInput").value.trim();

    if (!username || !password) {
        statusDiv.innerText = "Error: Username and Password are required!";
        statusDiv.style.color = "var(--danger)";
        return;
    }

    statusDiv.innerText = "Connecting to server...";
    statusDiv.style.color = "var(--warning)";
    loginBtn.disabled = true;

    try {
        const formData = new FormData();
        formData.append('username', username);
        formData.append('password', password);

        const response = await fetch(`${BASE_URL}/login`, { method: 'POST', body: formData });
        if (!response.ok) throw new Error(`Status: ${response.status}`);

        const data = await response.json();
        currentToken = data.session;
        currentCompanyId = data.companyID;

        statusDiv.innerText = `Connected: ${data.fullname}`;
        statusDiv.style.color = "var(--success)";
        scanBtn.disabled = false;
        loginBtn.disabled = false;
    } catch (error) {
        statusDiv.innerText = "Login failed, please check credentials: " + error.message;
        statusDiv.style.color = "var(--danger)";
        loginBtn.disabled = false;
    }
}

async function scanLastHalfHour() {
    const statusDiv = document.getElementById('status');
    const MyResultsDiv = document.getElementById('results');
    
    MyResultsDiv.innerHTML = "";
    statusDiv.innerText = "Fetching stations list...";
    statusDiv.style.color = "var(--warning)";

    try {
        const stationsResponse = await fetch(`${BASE_URL}/stations?session_token=${currentToken}&company=${currentCompanyId}`);
        rawStationsData = await stationsResponse.json();
        
        const timePeriods = getLastHalfHourPeriods();
        statusDiv.innerText = `Scanning ${rawStationsData.length} stations over the last 30 mins...`;

        let activeCount = 0;

        await Promise.all(rawStationsData.map(async (station) => {
            const stationId = station.id || station.station_id || station.station;
            const stationName = station.name || stationId;

            for (const period of timePeriods) {
                try {
                    const sensorsResponse = await fetch(`${BASE_URL}/sensors?session_token=${currentToken}&station=${stationId}&period=${period}`);
                    if (sensorsResponse.ok) {
                        const resData = await sensorsResponse.json();
                        
                        if (resData && resData.id && resData.numberOfSensors > 0) {
                            
                            let hasValidData = false;
                            for (let i = 1; i <= resData.numberOfSensors; i++) {
                                const vol = resData[`volume${i}`];
                                const lvl = resData[`levelSensor${i}`];
                                
                                if ((vol !== undefined && vol !== null) || (lvl !== undefined && lvl !== null)) {
                                    hasValidData = true;
                                    break;
                                }
                            }

                            if (hasValidData) {
                                activeCount++;
                                renderStationCard(stationName, resData, stationId);
                                break;
                            }
                        }
                    }
                } catch (e) {}
            }
        }));

        statusDiv.innerText = `Scan completed! Found ${activeCount} active stations.`;
        statusDiv.style.color = "var(--success)";
    } catch (error) {
        statusDiv.innerText = "Scan error: " + error.message;
        statusDiv.style.color = "var(--danger)";
    }
}

function renderStationCard(name, data, actualStationUuid) {
    const resultsDiv = document.getElementById('results');
    
    let tableRowsHtml = "";
    let validRowsCount = 0;

    for (let i = 1; i <= data.numberOfSensors; i++) {
        const volume = data[`volume${i}`];
        const level = data[`levelSensor${i}`];
        const maxLevel = data[`maxLevel${i}`] || 0;
        const product = data[`product${i}`] || 'Unknown';
        const temp = data[`temperature${i}`];
        const tankName = data[`tankName${i}`] || `Tank ${i}`;

        if ((volume === null || volume === undefined) && (level === null || level === undefined)) {
            continue;
        }

        validRowsCount++;
        
        const displayVolume = (volume !== undefined && volume !== null) ? volume : 0;
        const displayTemp = (temp !== undefined && temp !== null) ? `${temp}°C` : '--°C';
        const pct = maxLevel > 0 ? Math.min(Math.round((displayVolume / maxLevel) * 100), 100) : 0;
        const badgeClass = product.toLowerCase().includes('pms') || product.toLowerCase().includes('unleaded') ? 'badge-pms' : 'badge-diesel';

        tableRowsHtml += `
            <tr>
                <td style="text-align: left;">
                    <span class="badge ${badgeClass}">${product}</span> <strong>${tankName}</strong>
                    <div style="font-size: 11px; color: var(--text-muted); margin-top: 2px;">Temperature: ${displayTemp}</div>
                </td>
                <td style="text-align: right; vertical-align: top;">
                    <div><strong>${Number(displayVolume).toLocaleString()}</strong> / <span style="color: var(--text-muted);">${Number(maxLevel).toLocaleString()} L</span></div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" style="width: ${pct}%; background-color: ${pct < 20 ? 'var(--danger)' : pct < 50 ? 'var(--warning)' : 'var(--success)'}\"></div>
                    </div>
                    <div style="font-size: 10px; color: var(--text-muted); margin-top: 2px;">Capacity: ${pct}%</div>
                </td>
            </tr>
        `;
    }

    if (validRowsCount > 0) {
        const safeName = name.replace(/'/g, "\\'");
        
        let html = `
            <div class="station-card" onclick="showStationDetails('${safeName}', '${actualStationUuid}')">
                <div class="station-header">
                    <div class="station-title">${name} ➔</div>
                    <div class="station-time">${data.created}</div>
                </div>
                <table class="tank-table">
                    <thead>
                        <tr>
                            <th style="text-align: left;">Tank / Product</th>
                            <th style="text-align: right;">Current / Max Volume</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRowsHtml}
                    </tbody>
                </table>
            </div>
        `;
        resultsDiv.innerHTML += html;
    }
}

function showMainScreen() {
    document.getElementById('detailsScreen').classList.remove('active');
    document.getElementById('mainScreen').classList.add('active');
}

async function showStationDetails(stationName, stationUuid) {
    document.getElementById('mainScreen').classList.remove('active');
    document.getElementById('detailsScreen').classList.add('active');
    
    document.getElementById('detailsStationName').innerText = stationName;
    
    const txStatus = document.getElementById('txStatus');
    const txTable = document.getElementById('txTable');
    const pumpTabsContainer = document.getElementById('pumpTabsContainer');
    
    txStatus.style.display = "block";
    txStatus.innerText = "Fetching today's transactions...";
    txStatus.style.color = "var(--warning)";
    txTable.style.display = "none";
    pumpTabsContainer.innerHTML = "";
    currentLoadedTransactions = [];

    try {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        
        const fromTime = `${year}${month}${day}000000`;
        const toTime = `${year}${month}${day}235959`;
        
        const response = await fetch(`${BASE_URL}/transactions?session_token=${currentToken}&station=${stationUuid}&from=${fromTime}&to=${toTime}`);
        
        if (!response.ok) throw new Error(`Server returned status ${response.status}`);
        
        const rawText = await response.text();
        if (!rawText || rawText.trim() === "") {
            txStatus.innerText = "No data returned from server for today.";
            txStatus.style.color = "var(--text-muted)";
            return;
        }

        try {
            currentLoadedTransactions = JSON.parse(rawText);
        } catch (e) {
            txStatus.innerText = "Server response is not valid JSON.";
            txStatus.style.color = "var(--danger)";
            return;
        }

        if (!currentLoadedTransactions || currentLoadedTransactions.length === 0) {
            txStatus.innerText = "No transactions found for today.";
            txStatus.style.color = "var(--text-muted)";
            return;
        }

        txStatus.style.display = "none";
        txTable.style.display = "table";

        currentLoadedTransactions.sort((a, b) => (a.clock || 0) - (b.clock || 0));

        const uniquePumps = [...new Set(currentLoadedTransactions.map(tx => tx.pumpNo || tx.nozzle || '1'))].sort((a,b) => a - b);
        
        let tabsHtml = `<button class="pump-tab active" onclick="filterByPump('all', this)">All Pumps</button>`;
        uniquePumps.forEach(pump => {
            tabsHtml += `<button class="pump-tab" onclick="filterByPump('${pump}', this)">Pump ${pump}</button>`;
        });
        pumpTabsContainer.innerHTML = tabsHtml;

        renderTransactionRows(currentLoadedTransactions);

    } catch (error) {
        txStatus.innerText = "Failed to load transactions: " + error.message;
        txStatus.style.color = "var(--danger)";
    }
}

function filterByPump(pumpTarget, tabButton) {
    const tabs = document.querySelectorAll('.pump-tab');
    tabs.forEach(t => t.classList.remove('active'));
    tabButton.classList.add('active');

    if (pumpTarget === 'all') {
        renderTransactionRows(currentLoadedTransactions);
    } else {
        const filtered = currentLoadedTransactions.filter(tx => (tx.pumpNo || tx.nozzle || '1') == pumpTarget);
        renderTransactionRows(filtered);
    }
}

function renderTransactionRows(transactionsList) {
    const txRows = document.getElementById('txRows');
    txRows.innerHTML = "";

    if (transactionsList.length === 0) {
        txRows.innerHTML = `<tr><td colspan="3" style="text-align:center; color: var(--text-muted); padding: 20px;">No transactions found.</td></tr>`;
        return;
    }

    const mergedTransactions = [];
    const MAX_GAP_MS = 15 * 60 * 1000; 

    transactionsList.forEach(tx => {
        const txVehicleId = tx.vehicleUuid || tx.vehicleName || 'unknown-vehicle';
        const txPump = tx.pumpNo || tx.nozzle || '1';
        const txClock = tx.clock || (tx.created ? tx.created : new Date().getTime());
        const txVolume = parseFloat(tx.fuelValue1 || tx.volume || 0);
        const txTimeStr = tx.clocks || tx.createds || '--:--';
        
        // Extract GPS fields safely from payload
        const txLat = tx.gpslat;
        const txLng = tx.gpslng;

        let existing = mergedTransactions.find(m => 
            m.vehicleId === txVehicleId && 
            m.pumpNo === txPump &&
            (txClock - m.lastClock) <= MAX_GAP_MS
        );

        if (existing) {
            existing.totalVolume += txVolume;
            existing.lastClock = txClock;
            existing.endTimeStr = txTimeStr.split(' ')[1] || txTimeStr;
            existing.isSplit = true;
        } else {
            const startTime = txTimeStr.split(' ')[1] || txTimeStr;
            mergedTransactions.push({
                vehicleId: txVehicleId,
                vehicleName: tx.vehicleName || 'Unknown Vehicle',
                pumpNo: txPump,
                productName: tx.productName || 'Fuel',
                startTimeStr: startTime,
                endTimeStr: startTime,
                firstClock: txClock,
                lastClock: txClock,
                totalVolume: txVolume,
                isSplit: false,
                lat: txLat, // Keeping tracking coordinates from initial fueling trigger
                lng: txLng
            });
        }
    });

    let totalVolumeSum = 0;

    mergedTransactions.forEach(tx => {
        totalVolumeSum += tx.totalVolume;
        const badgeClass = tx.productName.toLowerCase().includes('pms') || tx.productName.toLowerCase().includes('unleaded') ? 'badge-pms' : 'badge-diesel';
        
        const timeDisplay = tx.isSplit ? `${tx.startTimeStr} - ${tx.endTimeStr}` : tx.startTimeStr;
        const splitIndicator = tx.isSplit ? `<span style="color: var(--warning); font-size: 10px; margin-left:4px;">(Merged)</span>` : '';

        // Generate precise Google Maps URL if coordinate integers are valid
        let gpsHtml = "";
        if (tx.lat && tx.lng && tx.lat !== 0 && tx.lng !== 0) {
            const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${tx.lat},${tx.lng}`;
            gpsHtml = `<br><a href="${mapsUrl}" target="_blank" class="gps-link">📍 View Location Map</a>`;
        } else {
            gpsHtml = `<br><span style="font-size:11px; color:var(--text-muted);">📍 No GPS Signal</span>`;
        }

        txRows.innerHTML += `
            <tr>
                <td style="text-align: left;">
                    <strong>${timeDisplay}</strong> ${splitIndicator}
                    <div style="font-size: 11px; color: var(--text-muted);">${tx.vehicleName}</div>
                    ${gpsHtml}
                </td>
                <td style="text-align: left; vertical-align: middle;">
                    <span class="badge ${badgeClass}">${tx.productName}</span>
                    <span style="font-size: 11px; color: var(--text-muted); margin-left: 4px;">Pump ${tx.pumpNo}</span>
                </td>
                <td style="text-align: right; font-weight: bold; font-size: 14px; color: var(--text-main); vertical-align: middle;">
                    ${tx.totalVolume.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1})} L
                </td>
            </tr>
        `;
    });

    txRows.innerHTML += `
        <tr style="background-color: #273549;">
            <td colspan="2" style="text-align: left; padding: 10px; font-weight: bold; border-radius: 0 0 0 8px;">Total Dispensed:</td>
            <td style="text-align: right; padding: 10px; font-weight: bold; color: var(--success); font-size: 15px; border-radius: 0 0 8px 0;">
                ${totalVolumeSum.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1})} L
            </td>
        </tr>
    `;
}
</script>

</body>
</html>
